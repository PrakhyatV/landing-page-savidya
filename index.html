<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savidya: Sahakar Vidyalaya - Watch. Learn. Grow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-grid">
                <!-- Left Box - Minister Launch -->
                <div class="hero-box launch-box">
                    <h2 class="launch-title">Launch of<br>Savidya Sahakar<br>Portal</h2>
                    <p class="launch-subtitle">Inauguration by</p>
                    <h3 class="minister-name">Shri Amit Shah</h3>
                    <p class="minister-title">Honourable Union Minister of Home Affairs and<br>Minister of Cooperation</p>
                    <div class="minister-image">
                        <img src="img/amit-shah.webp" alt="Shri Amit Shah">
                    </div>
                </div>

                <!-- Right Box - Portal Info -->
<div class="hero-box portal-box">
                    <div class="portal-content">
                        <div class="portal-logo">
                            <div class="savidya-text-logo">
                                <div class="logo-bar orange"></div>
                                <h2 class="savidya-title">Savidya</h2>
                                <div class="logo-bar green"></div>
                            </div>
                            <p class="portal-tagline">देखें। सीखें। बढ़ें</p>
                        </div>
                        
                        <!-- Image Grid -->
                        <div class="image-grid">
                            <div class="scroll-row scroll-right">
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1074&auto=format&fit=crop" alt="Tea Plantation"></div>
                                <div class="grid-item"><img src="https://teastory.blog/wp-content/uploads/2024/10/33563-hdimg-ukkuru-42.jpg" alt="Tea Processing"></div>
                                <div class="grid-item"><img src="https://www.hillsandhues.com/uploads/big-031220051030993-tea-plantation.jpg" alt="Tea Garden"></div>
                                <div class="grid-item"><img src="https://www.ictcoffee.com/wp-content/uploads/2023/06/buy-green-coffee-beans-600x400.jpeg" alt="Coffee Beans"></div>
                                <div class="grid-item"><img src="https://cdn.pixabay.com/photo/2016/11/22/21/59/peanuts-1850809_1280.jpg" alt="Peanuts"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1526346698789-22fd84314424?q=80&w=1170&auto=format&fit=crop" alt="Vegetables"></div>
                                <!-- Duplicate for seamless loop -->
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1074&auto=format&fit=crop" alt="Tea Plantation"></div>
                                <div class="grid-item"><img src="https://teastory.blog/wp-content/uploads/2024/10/33563-hdimg-ukkuru-42.jpg" alt="Tea Processing"></div>
                                <div class="grid-item"><img src="https://www.hillsandhues.com/uploads/big-031220051030993-tea-plantation.jpg" alt="Tea Garden"></div>
                                <div class="grid-item"><img src="https://www.ictcoffee.com/wp-content/uploads/2023/06/buy-green-coffee-beans-600x400.jpeg" alt="Coffee Beans"></div>
                                <div class="grid-item"><img src="https://cdn.pixabay.com/photo/2016/11/22/21/59/peanuts-1850809_1280.jpg" alt="Peanuts"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1526346698789-22fd84314424?q=80&w=1170&auto=format&fit=crop" alt="Vegetables"></div>
                            </div>
                            
                            <div class="scroll-row scroll-left">
                                <div class="grid-item"><img src="https://cdn.pixabay.com/photo/2023/09/29/07/58/mango-8283268_1280.jpg" alt="Mango"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1720710026803-f02dd4babbc9?q=80&w=1170&auto=format&fit=crop" alt="Produce"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1647377502180-7604b5470dbe?q=80&w=1025&auto=format&fit=crop" alt="Grains"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1669296667524-906d519cbe3e?q=80&w=1074&auto=format&fit=crop" alt="Spices"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1669296667524-906d519cbe3e?q=80&w=1074&auto=format&fit=crop" alt="Spices"></div>
                                <div class="grid-item"><img src="https://plus.unsplash.com/premium_photo-1670758291967-25ed2e90f21e?q=80&w=687&auto=format&fit=crop" alt="Organic"></div>
                                <!-- Duplicate for seamless loop -->
                                <div class="grid-item"><img src="https://cdn.pixabay.com/photo/2023/09/29/07/58/mango-8283268_1280.jpg" alt="Mango"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1720710026803-f02dd4babbc9?q=80&w=1170&auto=format&fit=crop" alt="Produce"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1647377502180-7604b5470dbe?q=80&w=1025&auto=format&fit=crop" alt="Grains"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1669296667524-906d519cbe3e?q=80&w=1074&auto=format&fit=crop" alt="Spices"></div>
                                <div class="grid-item"><img src="https://images.unsplash.com/photo-1669296667524-906d519cbe3e?q=80&w=1074&auto=format&fit=crop" alt="Spices"></div>
                                <div class="grid-item"><img src="https://plus.unsplash.com/premium_photo-1670758291967-25ed2e90f21e?q=80&w=687&auto=format&fit=crop" alt="Organic"></div>
                            </div>
                        </div>
                        
                        <div class="portal-link">
                            <span class="website-icon">🌐</span>
                            <span class="website-url">www.savidya.coop</span>
                            <a href="https://savidya.coop" class="launch-btn" target="_blank">Launch</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Countdown Modal -->
    <div id="countdownModal" class="countdown-modal">
        <div class="countdown-content">
            <div class="countdown-logo">
                <div class="savidya-text-logo-small">
                    <div class="logo-bar orange"></div>
                    <h2 class="savidya-title-small">Savidya</h2>
                    <div class="logo-bar green"></div>
                </div>
                <p class="countdown-tagline">देखें। सीखें। बढ़ें</p>
            </div>
            <div class="countdown-circle">
                <svg class="countdown-svg" width="200" height="200">
                    <circle class="countdown-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="countdown-progress" cx="100" cy="100" r="90" id="progressCircle"></circle>
                </svg>
                <div class="countdown-number" id="countdownNumber">5</div>
            </div>
            <div class="countdown-url">www.savidya.coop</div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
