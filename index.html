<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savidya: Sahakar Vidyalaya - Watch. Learn. Grow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <!-- Logo Section -->
                <div class="logo-section">
                    <img src="img/ncel-logo.png" alt="National Cooperative Exports Limited" class="logo">
                    <img src="img/ncel2025-logo.png" alt="NCEL 2025" class="logo">
                </div>

                <!-- Navigation Links -->
                <div class="nav-links">
                    <div class="dropdown">
                        <button class="dropdown-btn">
                            Commodities
                            <span class="arrow">▼</span>
                        </button>
                        <div class="dropdown-content">
                            <a href="#agriculture">Agriculture</a>
                            <a href="#dairy">Dairy</a>
                            <a href="#handicrafts">Handicrafts</a>
                        </div>
                    </div>

                    <div class="dropdown">
                        <button class="dropdown-btn">
                            EN
                            <span class="arrow">▼</span>
                        </button>
                        <div class="dropdown-content">
                            <a href="#en">English</a>
                            <a href="#hi">हिंदी</a>
                        </div>
                    </div>

                    <a href="#login" class="login-btn">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-grid">
                <!-- Left Box - Minister Launch -->
                <div class="hero-box launch-box">
                    <h2 class="launch-title">Launch of<br>Savidya Sahakar<br>Portal</h2>
                    <p class="launch-subtitle">Inauguration by</p>
                    <h3 class="minister-name">Shri Amit Shah</h3>
                    <p class="minister-title">Honourable Union Minister of Home Affairs and<br>Minister of Cooperation</p>
                    <div class="minister-image">
                        <img src="img/amit-shah.webp" alt="Shri Amit Shah">
                    </div>
                </div>

                <!-- Right Box - Portal Info -->
                <div class="hero-box portal-box">
                    <div class="portal-content">
                        <div class="portal-logo">
                            <img src="img/savidya-logo.png" alt="Savidya Logo">
                            <p class="portal-tagline">Watch. Learn. Grow</p>
                        </div>
                        <div class="portal-preview">
                            <!-- Add portal preview/screenshot here -->
                            <img src="img/portal-preview.png" alt="Savidya Portal">
                        </div>
                        <div class="portal-link">
                            <span class="website-icon">🌐</span>
                            <span class="website-url">www.savidya.coop</span>
                            <a href="https://savidya.coop" class="launch-btn" target="_blank">Launch</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
