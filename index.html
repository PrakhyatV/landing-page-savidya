<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savidya: Sahakar Vidyalaya - Watch. Learn. Grow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-grid">
                <!-- Left Box - Minister Launch -->
                <div class="hero-box launch-box">
                    <h2 class="launch-title">Launch of<br>Savidya: Sahakar<br>Vidyalaya</h2>
                    <p class="launch-subtitle">Inauguration by</p>
                    <h3 class="minister-name">Shri Amit Shah</h3>
                    <p class="minister-title">Honourable Union Minister of Home Affairs and Minister of Cooperation</p>
                    <div class="minister-image">
                        <img src="img/amit-shah.webp" alt="Shri Amit Shah">
                    </div>
                </div>

                <!-- Right Box - Portal Info -->
<div class="hero-box portal-box">
                    <div class="portal-content">
                        <!-- Countdown Section (Hidden initially) -->
                        <div class="countdown-section" id="countdownSection" style="display: none;">
                            <div class="countdown-inline-content">
                                <!-- Countdown Circle -->
                                <div class="countdown-circle">
                                    <svg class="countdown-svg" width="130" height="130">
                                        <circle class="countdown-bg" cx="65" cy="65" r="57"></circle>
                                        <circle class="countdown-progress" cx="65" cy="65" r="57" id="progressCircleInline"></circle>
                                    </svg>
                                    <div class="countdown-number" id="countdownNumberInline">5</div>
                                </div>
                                
                                <!-- Website URL below countdown -->
                                <div class="countdown-url-inline">www.savidya.coop</div>
                            </div>
                        </div>
                        
                        <div class="portal-link">
                            <div class="website-header">
                                <span class="website-icon">🌐</span>
                                <span class="website-url">Savidya.coop</span>
                            </div>
                            <a href="https://savidya.coop" class="launch-btn">Launch</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Countdown Modal -->
    <div id="countdownModal" class="countdown-modal">
        <div class="countdown-content">
            <div class="countdown-logo">
                <div class="savidya-text-logo-small">
                    <div class="logo-bar orange"></div>
                    <h2 class="savidya-title-small">Savidya</h2>
                    <div class="logo-bar green"></div>
                </div>
                <p class="countdown-tagline">देखें। सीखें। बढ़ें।</p>
            </div>
            <div class="countdown-circle">
                <svg class="countdown-svg" width="200" height="200">
                    <circle class="countdown-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="countdown-progress" cx="100" cy="100" r="90" id="progressCircle"></circle>
                </svg>
                <div class="countdown-number" id="countdownNumber">5</div>
            </div>
            <div class="countdown-url">www.savidya.coop</div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
