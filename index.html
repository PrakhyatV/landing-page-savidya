<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savidya: Sahakar Vidyalaya - Watch. Learn. Grow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <!-- Logo Section -->
                <div class="logo-section">
                    <img src="img/ncel-logo.png" alt="National Cooperative Exports Limited" class="logo">
                    <img src="img/ncel2025-logo.png" alt="NCEL 2025" class="logo">
                    <img src="img/iyc-logo.png" alt="International Year of Cooperatives 2025" class="logo">
                </div>

                <!-- Navigation Links -->
                <div class="nav-links">
                    <div class="dropdown">
                        <button class="dropdown-btn">
                            Commodities
                            <span class="arrow">▼</span>
                        </button>
                        <div class="dropdown-content">
                            <a href="#agriculture">Agriculture</a>
                            <a href="#dairy">Dairy</a>
                            <a href="#handicrafts">Handicrafts</a>
                        </div>
                    </div>

                    <div class="dropdown">
                        <button class="dropdown-btn">
                            EN
                            <span class="arrow">▼</span>
                        </button>
                        <div class="dropdown-content">
                            <a href="#en">English</a>
                            <a href="#hi">हिंदी</a>
                        </div>
                    </div>

                    <a href="#login" class="login-btn">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="container">
            <div class="hero-content">
                <p class="hero-tagline">Watch. Learn. Grow</p>
                <h1 class="hero-title">Savidya: Sahakar Vidyalaya</h1>
            </div>
        </div>
    </section>

    <!-- Launch Section -->
    <section class="launch-section">
        <div class="container">
            <div class="launch-content">
                <h2 class="launch-title">Launch of<br>Savidya Sahakar<br>Portal</h2>
                <p class="launch-subtitle">Inauguration by</p>
                <h3 class="minister-name">Shri Amit Shah</h3>
                <p class="minister-title">Honourable Union Minister of Home Affairs and<br>Minister of Cooperation</p>
                <div class="minister-image">
                    <img src="img/amit-shah.jpg" alt="Shri Amit Shah">
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
